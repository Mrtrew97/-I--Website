<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence Core // DRILLDOWN_V7</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .app-container { position: relative; z-index: 1; }
        .sticky-wrapper {
            position: sticky; top: 0; z-index: 999; padding: 10px 0 20px 0;
            background: transparent; backdrop-filter: blur(12px) saturate(150%);
            -webkit-backdrop-filter: blur(12px) saturate(150%);
        }
        .primary-controls { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; margin-bottom: 20px; }
        .view-toggle-container {
            display: flex; align-items: center; background: rgba(255, 255, 255, 0.05);
            border-radius: 50px; padding: 4px; height: 34px; width: fit-content;
            position: relative; border: 1px solid rgba(147, 51, 234, 0.3);
        }
        .toggle-btn {
            background: transparent; border: none; color: #ffffff !important; 
            padding: 0 18px; height: 100%; font-size: 0.65rem; font-weight: 900;
            cursor: pointer; letter-spacing: 1.5px; transition: all 0.3s ease;
            position: relative; z-index: 2; text-transform: uppercase;
        }
        .pill-slider {
            position: absolute; background: var(--accent-purple); height: calc(100% - 8px);
            top: 4px; left: 4px; border-radius: 50px; transition: all 0.3s ease;
            z-index: 1; box-shadow: 0 0 15px rgba(147, 51, 234, 0.4);
        }
        .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; padding: 40px 0; }
        .growth-card { position: relative; z-index: 10; transition: transform 0.3s ease; cursor: pointer; }
        .growth-card:hover { transform: translateY(-8px); }
        .metric-bar { display: flex; gap: 6px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .delta-text { font-weight: 900; font-size: 0.75rem; margin-top: 4px; letter-spacing: 1px; }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }
        .chart-container { height: 160px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader"><div class="loading-text">RESTORING_CORE_PROTOCOL...</div></div>

<div class="app-container">
    <div class="header-nav" id="headerNav">
        <div id="navActionContainer">
            <button class="exit-btn" onclick="window.location.href='index.html'">← SYSTEM_RETURN</button>
        </div>
        <div id="subjectCount" style="font-size: 0.75rem; font-weight: 900; color: var(--accent-purple);">ACTIVE_MEMBERS // --</div>
    </div>

    <div id="drilldownContent">
        <div class="sticky-wrapper" id="controlsWrapper">
            <div class="primary-controls">
                <div class="custom-select-wrapper">
                    <select id="seasonFolder" onchange="handleFolderChange()">
                        <option value="">-- SELECT DATA FOLDER --</option>
                        <option value="ALL_KVKS">★ ALL KVKS</option>
                    </select>
                </div>
                <input type="text" id="playerSearch" class="search-box" placeholder="SEARCH_LORDS..." oninput="renderDisplay()">
                
                <div class="view-toggle-container" id="toggleWrapper" style="display: none;">
                    <div id="pill-bg" class="pill-slider"></div>
                    <button id="mode-total" class="toggle-btn active" onclick="setMode('total')">TOTAL</button>
                    <button id="mode-growth" class="toggle-btn" onclick="setMode('growth')">GROWTH</button>
                </div>
            </div>
            <div class="metric-bar" id="metricBar"></div>
        </div>
        <div class="player-grid" id="mainGrid"></div>
    </div>
</div>

<script>
    const BASE_PATH = "IData/"; 
    const POWER_FLOOR = 35000000;
    const MIN_SHEETS = 2; 
    const targetServers = ["167", "509"];
    let weeklyData = {};
    let currentSortMetric = 'highest_power';
    let fileListData = {};
    let isAllKvksMode = false;
    let selectedPlayerId = null;
    let currentViewMode = 'total'; 

    const metrics = {
        'highest_power': 'HIGHEST POWER', 'merits': 'MERITS', 'units_killed': 'TOTAL KILLS',
        'killcount_t5': 'T5 KILLS', 'killcount_t4': 'T4 KILLS', 'killcount_t3': 'T3 KILLS',
        'killcount_t2': 'T2 KILLS', 'killcount_t1': 'T1 KILLS', 'units_dead': 'DEADS',
        'units_healed': 'HEALED', 'gold_spent': 'GOLD SPENT', 'wood_spent': 'WOOD SPENT',
        'stone_spent': 'STONE SPENT', 'mana_spent': 'MANA SPENT'
    };

    function updatePillPosition(mode) {
        const pill = document.getElementById('pill-bg');
        const btn = document.getElementById(mode === 'total' ? 'mode-total' : 'mode-growth');
        if (pill && btn) {
            pill.style.width = btn.offsetWidth + "px";
            pill.style.left = btn.offsetLeft + "px";
        }
    }

    function setMode(mode) {
        currentViewMode = mode;
        updatePillPosition(mode);
        renderDisplay();
    }

    async function init() {
        const bar = document.getElementById('metricBar');
        Object.entries(metrics).forEach(([key, label]) => {
            const btn = document.createElement('button');
            btn.className = `metric-btn ${key === currentSortMetric ? 'active' : ''}`;
            btn.textContent = label;
            btn.onclick = () => {
                document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); currentSortMetric = key; renderDisplay();
            };
            bar.appendChild(btn);
        });

        try {
            const res = await fetch('data/files.json');
            fileListData = await res.json();
            const selector = document.getElementById('seasonFolder');
            fileListData.iDataFolders.forEach(folder => {
                const opt = document.createElement('option');
                opt.value = folder.name; opt.textContent = folder.name.replace(/^\d+\s*-\s*/, '');
                selector.appendChild(opt);
            });
            selector.value = "ALL_KVKS";
            handleFolderChange();
        } catch(e) { console.error("Init failed", e); }
    }

    async function handleFolderChange() {
        const val = document.getElementById('seasonFolder').value;
        if (!val) return;
        document.getElementById('loader').style.display = 'flex';
        weeklyData = {}; 
        isAllKvksMode = (val === 'ALL_KVKS');
        document.getElementById('toggleWrapper').style.display = isAllKvksMode ? 'flex' : 'none';

        if (isAllKvksMode) {
            await loadDynamicAllKvks();
        } else {
            await loadSingleFolder(val);
        }
        
        document.getElementById('loader').style.display = 'none';
        renderDisplay();
        if (isAllKvksMode) setTimeout(() => updatePillPosition(currentViewMode), 50);
    }

    async function loadDynamicAllKvks() {
        const folders = fileListData.iDataFolders;
        for (const folderMeta of folders) {
            const fName = folderMeta.name.replace('KVK', 'KvK');
            const files = folderMeta.files;
            if (files.length < 2) continue;
            const [rOld, rNew] = await Promise.all([fetch(BASE_PATH + fName + "/" + files[0]), fetch(BASE_PATH + fName + "/" + files[files.length - 1])]);
            const [dOld, dNew] = [parseCSV(await rOld.text()), parseCSV(await rNew.text())];

            Object.keys(dNew).forEach(id => {
                if (parseInt(dNew[id].highest_power) < POWER_FLOOR) return;
                if (!weeklyData[id]) weeklyData[id] = { name: dNew[id].name, timeline: [], growth: [], sheetCount: 0 };
                
                let totalEntry = { label: fName };
                let growthEntry = { label: fName };
                Object.keys(metrics).forEach(m => {
                    const v1 = parseInt(dOld[id]?.[m]) || 0;
                    const v2 = parseInt(dNew[id][m]) || 0;
                    totalEntry[m] = v2;
                    growthEntry[m] = v2 - v1;
                });
                weeklyData[id].timeline.push(totalEntry);
                weeklyData[id].growth.push(growthEntry);
                weeklyData[id].sheetCount++;
            });
        }
    }

    async function loadSingleFolder(folderName) {
        const folderMeta = fileListData.iDataFolders.find(f => f.name === folderName);
        const files = folderMeta.files;
        const pathPrefix = BASE_PATH + folderName.replace('KVK', 'KvK') + "/";
        for (const f of files) {
            const r = await fetch(pathPrefix + f);
            const d = parseCSV(await r.text());
            Object.keys(d).forEach(id => {
                if (parseInt(d[id].highest_power) < POWER_FLOOR) return;
                if (!weeklyData[id]) weeklyData[id] = { name: d[id].name, timeline: [], sheetCount: 0 };
                let entry = { label: f.replace('.csv','') };
                Object.keys(metrics).forEach(m => entry[m] = parseInt(d[id][m]) || 0);
                weeklyData[id].timeline.push(entry);
                weeklyData[id].sheetCount++;
            });
        }
    }

    function renderDisplay() {
        const grid = document.getElementById('mainGrid');
        const query = document.getElementById('playerSearch').value.toLowerCase();
        grid.innerHTML = "";
        
        if (selectedPlayerId && weeklyData[selectedPlayerId]) {
            return renderSoloMode(selectedPlayerId);
        }

        const isGrowth = currentViewMode === 'growth' && isAllKvksMode;
        const sorted = Object.entries(weeklyData).filter(([id, data]) => {
            return data.sheetCount >= (isAllKvksMode ? 1 : MIN_SHEETS) && (!query || data.name.toLowerCase().includes(query) || id.includes(query));
        }).sort((a, b) => {
            const setA = isGrowth ? a[1].growth : a[1].timeline;
            const setB = isGrowth ? b[1].growth : b[1].timeline;
            return (setB[setB.length-1][currentSortMetric] || 0) - (setA[setA.length-1][currentSortMetric] || 0);
        });

        document.getElementById('subjectCount').textContent = `ACTIVE_MEMBERS // ${sorted.length}`;

        sorted.forEach(([id, data], index) => {
            const activeSet = isGrowth ? data.growth : data.timeline;
            const currentVal = activeSet[activeSet.length - 1][currentSortMetric];
            
            let deltaHTML = "";
            if (!isGrowth && activeSet.length > 1) {
                const delta = currentVal - activeSet[0][currentSortMetric];
                deltaHTML = `<div class="delta-text ${delta >= 0 ? 'positive' : 'negative'}">${delta >= 0 ? '▲' : '▼'} ${Math.abs(delta).toLocaleString()}</div>`;
            }

            const card = document.createElement('div');
            card.className = "growth-card glow-purple";
            card.onclick = () => { selectedPlayerId = id; renderDisplay(); };
            card.innerHTML = `
                <div class="rank-banner">#${index+1}</div>
                <h3 style="margin:0; color:var(--text-title);">${data.name}</h3>
                <div style="font-size:0.6rem; color:var(--text-dim);">ID: ${id}</div>
                <div style="margin:20px 0;">
                    <div class="stat-label">${metrics[currentSortMetric]} ${isGrowth ? 'GROWTH' : ''}</div>
                    <div class="stat-value" style="font-size:1.4rem;">${currentVal.toLocaleString()}</div>
                    ${deltaHTML}
                </div>
                <div class="chart-container"><canvas id="chart-${id}"></canvas></div>
            `;
            grid.appendChild(card);
            createChart(`chart-${id}`, activeSet, currentSortMetric);
        });
    }

    function renderSoloMode(id) {
        const grid = document.getElementById('mainGrid');
        const data = weeklyData[id];
        const isGrowth = currentViewMode === 'growth' && isAllKvksMode;
        
        grid.innerHTML = `
            <div class="solo-header">
                <button class="exit-btn" onclick="selectedPlayerId=null; renderDisplay();">← RETURN_TO_GRID</button>
                <h2>${data.name}</h2>
                <div class="stat-label">ID: ${id}</div>
            </div>
        `;

        Object.keys(metrics).forEach(m => {
            const activeSet = isGrowth ? data.growth : data.timeline;
            const val = activeSet[activeSet.length-1][m];
            const card = document.createElement('div');
            card.className = "growth-card glow-purple";
            card.style.cursor = "default";
            card.innerHTML = `
                <div class="stat-label">${metrics[m]} ${isGrowth ? 'GROWTH' : ''}</div>
                <div class="stat-value" style="font-size:1.6rem;">${val.toLocaleString()}</div>
                <div class="chart-container"><canvas id="solo-${m}"></canvas></div>
            `;
            grid.appendChild(card);
            createChart(`solo-${m}`, activeSet, m);
        });
    }

    function createChart(canvasId, timeline, metricKey) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: timeline.map(t => t.label),
                datasets: [{ data: timeline.map(t => t[metricKey]), borderColor: '#9333ea', tension: 0.3, fill: false }]
            },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false } }, 
                scales: { x: { display: false }, y: { display: false } } 
            }
        });
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        const headers = lines[0].toLowerCase().split(',').map(h => h.trim().replace(/^"|"$/g, ''));
        const result = {};
        lines.slice(1).forEach(line => {
            const cells = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
            const row = {}; headers.forEach((h, i) => row[h] = cells[i]);
            if (targetServers.includes(row.home_server || row.server)) result[row.lord_id || row.id] = row;
        });
        return result;
    }
    window.onload = init;
</script>
</body>
</html>
