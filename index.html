<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IllumiNaughty // COMMAND_CENTER</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* CORE LAYOUT */
        :root {
            --accent-purple: #9333ea;
            --text-title: #ffffff;
            --text-dim: #9d8ba1;
        }

        body {
            background-color: #0a0a0c;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .dashboard-container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-size: 3.5rem;
            letter-spacing: 15px;
            color: var(--text-title);
            margin: 0;
            text-transform: uppercase;
            font-weight: 900;
        }

        .subtitle {
            color: var(--accent-purple);
            font-weight: 900;
            letter-spacing: 5px;
            margin-top: 10px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* CONTROL GRID */
        .control-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(147, 51, 234, 0.3);
            color: #fff;
            padding: 40px 20px;
            border-radius: 15px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(147, 51, 234, 0.2), transparent);
            transition: 0.5s;
        }

        .action-btn:hover::before {
            left: 100%;
        }

        .action-btn:hover {
            background: rgba(147, 51, 234, 0.1);
            border-color: var(--accent-purple);
            box-shadow: 0 0 30px rgba(147, 51, 234, 0.2);
            transform: translateY(-10px);
        }

        .action-btn span {
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        /* DECORATIVE ELEMENTS */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.1) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="dashboard-container">
    <header>
        <h1>COMMAND_CENTER</h1>
        <div class="subtitle">ALLIANCE_MANAGEMENT_PROTOCOL_V1.0</div>
    </header>

    <div class="control-section">
        <button class="action-btn" onclick="goToMyStats()">
            MY STATS
            <span>PERSONAL_DRILLDOWN</span>
        </button>
        
        <button class="action-btn" onclick="window.location.href='-I-Alliance.html'">
            ALLIANCE DATA
            <span>GROUP_METRICS</span>
        </button>

        <button class="action-btn" onclick="window.location.href='-I-Players.html'">
            PLAYER DIRECTORY
            <span>GLOBAL_LORDS_LIST</span>
        </button>

        <button class="action-btn">
            SYSTEM LOGS
            <span>ACCESS_CHRONICLES</span>
        </button>
    </div>
</div>

<script>
    /**
     * Logic for the My Stats button
     * Uses the stored ID to build a filtered URL for the player page
     */
    function goToMyStats() {
        // Retrieve the user's ID from local storage
        const savedId = localStorage.getItem('alliance_user_id');
        
        if (savedId) {
            // Redirect with the ID parameter for automatic filtering
            window.location.href = `-I-Players.html?id=${savedId}`;
        } else {
            // If no ID exists, fallback to the general player list
            alert("SYSTEM_ERROR: No User ID found. Please search for your ID in the Directory first.");
            window.location.href = '-I-Players.html';
        }
    }
</script>

</body>
</html>
